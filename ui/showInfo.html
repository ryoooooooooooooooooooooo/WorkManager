<!--show current homework etc...-->
<body class="bg-light">

    <div class="container my-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0" id="subject-title">提出宿題 一覧</h5>
                <span class="badge bg-light text-dark" id="task-count">0 件のタスク</span>
            </div>
            <div class="card-body p-3">
                <form id="add-homework-form" class="row g-2 mb-3">
                    <div class="col-md-8">
                        <input type="text" id="homeWorkName" name="homeWorkName" class="form-control" placeholder="課題名を入力" required>
                    </div>
                    <div class="col-md-3">
                        <input type="datetime-local" id="deadline" name="deadline" class="form-control" required>
                    </div>
                    <div class="col-md-1 d-grid">
                        <button type="submit" class="btn btn-primary">追加</button>
                    </div>
                    <div class="col-12">
                        <div id="form-error" class="text-danger small mt-1" style="display:none;"></div>
                    </div>
                </form>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 75%;">宿題名</th>
                                <th style="width: 25%;">提出期限</th>
                            </tr>
                        </thead>
                        <tbody id="homework-list">
                            <tr>
                                <td colspan="2" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                    データを読み込み中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="fetchInfo.js"></script>
    <script>
        // Read subject from query param and show it in the header
        (function(){
            const params = new URLSearchParams(window.location.search);
            const subject = params.get('subject');
            const titleEl = document.getElementById('subject-title');
            if(subject && titleEl){
                titleEl.textContent = subject + ' の提出宿題 一覧';
            }
        })();
        // The fetchInfo.js will attach the form handler if present
    </script>
</body>
