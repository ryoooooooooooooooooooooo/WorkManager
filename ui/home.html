<!DOCTYPE html>
<html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="work management, assignments, productivity">

    <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Work Manager</title>
    <style>
        #pagetitle{
            background-color: rgb(135, 135, 137);
            font-weight:800;
            color:white;
        }
        body{
            background-color: rgb(206, 206, 206);
        }
      .list-group-item{ cursor: pointer; }
    </style>
    </head>
    <body>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Work Manager</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="#" data-page="login.html">ログイン</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" data-page="create.html">新規</a>
              </li>
            <li>
              <a class="nav-link" href="#" data-page="showInfo.html">課題一覧</a>
            </li>
            </ul>
            <div class="d-flex ms-auto">
              <span class="navbar-text me-3">学籍番号: {{STUDENT_ID}}</span>
              <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
              </form>
            </div>
          </div>
        </div>
      </nav>
          <script>
            document.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', function(e) {
              const page = this.getAttribute('data-page');
              if (!page) return; 
              
              e.preventDefault();         fetch(page)
                  .then(response => response.text())
                  .then(html => {
                      document.getElementById('content-area').innerHTML = html;
                  });
          });
      });
          </script>   

      <div id="content-area" class="container mt-4">
        <h2>履修中の科目</h2>
        <ul class="list-group">
          {{SUBJECTS_LIST}}
        </ul>
      </div>
      <script>
        // Make list-group items navigable to showInfo.html with subject query param
        document.addEventListener('click', function(e){
          const li = e.target.closest('li.list-group-item');
          if(!li) return;
          const subj = li.getAttribute('data-subject') || li.textContent.trim();
          const teacher = li.getAttribute('data-teacher') || '';
          if(!subj) return;
          const params = new URLSearchParams();
          params.set('subject', subj);
          if(teacher) params.set('teacher', teacher);
          window.location.href = 'showInfo.html?' + params.toString();
        });
      </script>
  </body>
</html>
